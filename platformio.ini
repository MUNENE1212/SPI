; PlatformIO Project Configuration File
;
; Each mini-project lives under src/<name>/ and has its own [env:<name>] below.
; Build one project:   pio run -e 01_max7219_hello
; Upload one project:  pio run -e 01_max7219_hello -t upload
; Wokwi:               open the project's folder under src/ and start the sim.
;
; Shared helper headers live in include/ (spi_pins.h, emen_serial.h,
; emen_brand.h) and are visible to every env automatically.

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:01_max7219_hello]
build_src_filter = +<01_max7219_hello/>
lib_deps =
    majicdesigns/MD_Parola
    majicdesigns/MD_MAX72XX

[env:02_hello_tft]
build_src_filter = +<02_hello_tft/>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit BusIO

[env:03_sd_card]
build_src_filter = +<03_sd_card/>
; SD.h and FS.h ship with the ESP32 Arduino core — no external lib needed.

[env:04_shift_register]
build_src_filter = +<04_shift_register/>
; Uses the built-in SPI library only.

[env:05_rfid_mfrc522]
build_src_filter = +<05_rfid_mfrc522/>
lib_deps =
    miguelbalboa/MFRC522

[env:06_ws2812_signboard_spi]
build_src_filter = +<06_ws2812_signboard_spi/>
; WS2812 driven via ESP32 hardware SPI (MOSI-as-timing-generator). The SPI
; encoding is hand-rolled in main.cpp — each WS2812 bit becomes 4 SPI bits at
; 3.2 MHz — so we only need Adafruit_GFX for the built-in 5x7 font.
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO

[env:07_ws2812_status_rmt]
build_src_filter = +<07_ws2812_status_rmt/>
; WS2812 driven via the ESP32 RMT peripheral (native, protocol-correct). Not
; an SPI project — lives here as a companion to 06 for protocol comparison.
lib_deps =
    adafruit/Adafruit NeoPixel

[env:08_ws2812_advert_rmt]
build_src_filter = +<08_ws2812_advert_rmt/>
; RMT-native signboard with per-message color styles. Adafruit_NeoPixel for
; the RMT driving, Adafruit_GFX purely as a text rasterizer (drawPixel routed
; into a 1-bit mask, then a color-style function paints the mask).
lib_deps =
    adafruit/Adafruit NeoPixel
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
