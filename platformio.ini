; PlatformIO Project Configuration File
;
; Each mini-project lives under src/<name>/ and has its own [env:<name>] below.
; Build one project:   pio run -e 01_max7219_hello
; Upload one project:  pio run -e 01_max7219_hello -t upload
; Wokwi:               open the project's folder under src/ and start the sim.

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:01_max7219_hello]
build_src_filter = +<01_max7219_hello/>
lib_deps =
    majicdesigns/MD_Parola
    majicdesigns/MD_MAX72XX
